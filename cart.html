<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — Cold9</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 62.5%; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0A0A0F;
      color: #E0E0E0;
      font-size: 1.6rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── NAV ──────────────────────────────────────── */
    .cart-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 2rem 5.6rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
      background: rgba(10,10,15,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .cart-nav .logo {
      font-family: 'Inter', sans-serif;
      font-size: 2.6rem;
      font-weight: 900;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }
    .cart-nav .logo .nine { color: #06B6D4; }
    .cart-nav .logo sup { font-size: 0.45em; color: rgba(255,255,255,0.4); vertical-align: super; font-weight: 700; }
    .cart-nav-links { display: flex; gap: 2rem; align-items: center; }
    .cart-nav a.back {
      font-family: 'Space Mono', monospace;
      font-size: 1.15rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.8rem 1.6rem;
      border-radius: 9999px;
      transition: color 0.2s, background 0.2s;
    }
    .cart-nav a.back:hover { color: #fff; background: rgba(255,255,255,0.06); }

    /* ── CART PAGE ────────────────────────────────── */
    .cart-page {
      max-width: 128rem;
      margin: 0 auto;
      padding: 12rem 5.6rem 8rem;
      display: grid;
      grid-template-columns: 1fr 40rem;
      gap: 4rem;
      align-items: start;
    }

    .cart-title {
      font-family: 'Inter', sans-serif;
      font-size: 3.6rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .cart-count {
      font-size: 1.4rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 3rem;
    }

    /* Table header */
    .cart-table-head {
      display: grid;
      grid-template-columns: 1fr 18rem 10rem 4rem;
      gap: 2rem;
      padding: 1.4rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-family: 'Space Mono', monospace;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    .cart-table-head span:nth-child(2) { text-align: center; }
    .cart-table-head span:nth-child(3) { text-align: right; }

    /* Cart item row */
    .cart-row {
      display: grid;
      grid-template-columns: 1fr 18rem 10rem 4rem;
      gap: 2rem;
      align-items: center;
      padding: 2.4rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .cart-row:last-child { border-bottom: 1px solid rgba(255,255,255,0.1); }
    .cart-product {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .cart-product-img {
      width: 10rem; height: 10rem;
      border-radius: 14px;
      background: #ECECEC;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      flex-shrink: 0;
    }
    .cart-product-img img { width: 100%; height: 100%; object-fit: contain; }
    .cart-product-info h3 {
      font-family: 'Inter', sans-serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .cart-product-meta {
      font-size: 1.25rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }
    .cart-product-meta span { display: block; }

    /* Quantity control */
    .cart-qty {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      width: fit-content;
      margin: 0 auto;
    }
    .cart-qty button {
      width: 4rem; height: 4rem;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1.8rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .cart-qty button:hover { background: rgba(255,255,255,0.06); }
    .cart-qty-val {
      width: 4rem;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      border-left: 1.5px solid rgba(255,255,255,0.1);
      border-right: 1.5px solid rgba(255,255,255,0.1);
      padding: 0.8rem 0;
    }

    /* Total column */
    .cart-row-total {
      font-family: 'Space Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      text-align: right;
    }

    /* Delete */
    .cart-delete {
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      padding: 0.8rem;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-delete:hover { color: #EF4444; background: rgba(239,68,68,0.08); }

    /* ── SIDEBAR ──────────────────────────────────── */
    .cart-sidebar {
      position: sticky;
      top: 10rem;
    }
    .sidebar-card {
      background: linear-gradient(145deg, #131322 0%, #0F0F18 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 3rem 2.8rem;
    }
    .sidebar-subtotal {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }
    .sidebar-subtotal span:first-child {
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }
    .sidebar-subtotal-val {
      font-family: 'Space Mono', monospace;
      font-size: 2.8rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .sidebar-note {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2.4rem;
    }
    .sidebar-checkout {
      display: block;
      width: 100%;
      padding: 1.7rem;
      background: linear-gradient(90deg, #06B6D4 0%, #2563EB 100%);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      box-shadow: 0 14px 36px -10px rgba(37,99,235,0.55);
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s;
      margin-bottom: 1.4rem;
    }
    .sidebar-checkout:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 44px -10px rgba(37,99,235,0.75), 0 0 24px rgba(6,182,212,0.35);
    }
    .sidebar-continue {
      display: block;
      width: 100%;
      padding: 1.4rem;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.12);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border-radius: 14px;
      transition: border-color 0.2s, background 0.2s;
    }
    .sidebar-continue:hover { border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.04); }

    /* Empty cart */
    .cart-empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 8rem 2rem;
    }
    .cart-empty-state svg { margin-bottom: 2rem; color: rgba(255,255,255,0.2); }
    .cart-empty-state h2 {
      font-family: 'Inter', sans-serif;
      font-size: 2.8rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 1rem;
    }
    .cart-empty-state p {
      font-size: 1.5rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 3rem;
    }
    .cart-empty-state a.shop-btn {
      display: inline-block;
      padding: 1.4rem 3rem;
      background: linear-gradient(90deg, #06B6D4 0%, #2563EB 100%);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 9999px;
      box-shadow: 0 12px 32px -10px rgba(37,99,235,0.55);
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cart-empty-state a.shop-btn:hover { transform: translateY(-2px); }

    /* ── FOOTER ───────────────────────────────────── */
    .cart-footer-bar {
      background: #050508;
      padding: 3.2rem 5.6rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .cart-footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 120rem;
      margin: 0 auto;
      color: rgba(255,255,255,0.35);
      font-size: 1.1rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .cart-footer-inner .logo {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
    }
    .cart-footer-inner .logo .nine { color: #06B6D4; }

    /* Responsive */
    @media (max-width: 980px) {
      .cart-page { grid-template-columns: 1fr; padding: 10rem 2.4rem 6rem; }
      .cart-sidebar { position: static; }
      .cart-table-head { display: none; }
      .cart-row {
        grid-template-columns: 1fr auto auto;
        gap: 1.4rem;
      }
      .cart-qty { margin: 0; }
    }
    @media (max-width: 600px) {
      .cart-nav { padding: 1.6rem 2.4rem; }
      .cart-row { grid-template-columns: 1fr; gap: 1.2rem; }
      .cart-product-img { width: 8rem; height: 8rem; }
      .cart-row-total { text-align: left; }
      .cart-delete { justify-self: end; }
      .cart-footer-inner { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ────────────────────────────────────────── -->
  <nav class="cart-nav" aria-label="Primary">
    <a href="index.html" class="logo">Cold<span class="nine">9</span><sup>&reg;</sup></a>
    <div class="cart-nav-links">
      <a href="index.html" class="back">&larr; Continue Shopping</a>
    </div>
  </nav>

  <!-- ── CART ───────────────────────────────────────── -->
  <div class="cart-page" id="cart-page">
    <div id="cart-left">
      <h1 class="cart-title">Shopping Cart</h1>
      <div class="cart-count" id="cart-count"></div>
      <div class="cart-table-head">
        <span>Product</span>
        <span>Quantity</span>
        <span>Total</span>
        <span></span>
      </div>
      <div id="cart-rows"></div>
    </div>
    <div class="cart-sidebar" id="cart-sidebar">
      <div class="sidebar-card">
        <div class="sidebar-subtotal">
          <span>Subtotal</span>
          <span class="sidebar-subtotal-val" id="sidebar-total">$0</span>
        </div>
        <p class="sidebar-note">Taxes and shipping calculated at checkout.</p>
        <a href="checkout.html" class="sidebar-checkout">Check Out</a>
        <a href="product-detail.html" class="sidebar-continue">Continue Shopping</a>
      </div>
    </div>
  </div>

  <!-- ── FOOTER ─────────────────────────────────────── -->
  <footer class="cart-footer-bar">
    <div class="cart-footer-inner">
      <a href="index.html" class="logo">Cold<span class="nine">9</span>&reg;</a>
      <span>&copy; 2026 Cold9 Athletics &middot; Never Freeze Again</span>
    </div>
  </footer>

  <script>
    (function () {
      var colorImgs = {
        'pearl-white': 'cold9-white-pants-c9-logo.png',
        'graphite-gray': 'cold9-gray-pants.png'
      };

      function getCart() { return JSON.parse(localStorage.getItem('cold9_cart') || '[]'); }
      function saveCart(c) { localStorage.setItem('cold9_cart', JSON.stringify(c)); }

      function render() {
        var cart = getCart();
        var rowsEl = document.getElementById('cart-rows');
        var countEl = document.getElementById('cart-count');
        var totalEl = document.getElementById('sidebar-total');
        var sidebar = document.getElementById('cart-sidebar');
        var leftEl = document.getElementById('cart-left');

        if (cart.length === 0) {
          leftEl.innerHTML =
            '<div class="cart-empty-state">' +
            '<svg width="56" height="56" viewBox="0 0 24 24" fill="none"><path d="M9 22a1 1 0 100-2 1 1 0 000 2zM20 22a1 1 0 100-2 1 1 0 000 2z" fill="currentColor"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
            '<h2>Your cart is empty</h2>' +
            '<p>Looks like you haven&rsquo;t added anything yet.</p>' +
            '<a href="product-detail.html" class="shop-btn">Shop Cold9 Pants</a>' +
            '</div>';
          sidebar.style.display = 'none';
          return;
        }

        sidebar.style.display = '';
        var total = 0;
        var totalQty = 0;
        var html = '';

        cart.forEach(function (item, i) {
          var itemTotal = item.price * item.qty;
          total += itemTotal;
          totalQty += item.qty;
          var img = item.img || colorImgs[item.color] || 'cold9-white-pants-c9-logo.png';

          html +=
            '<div class="cart-row" data-index="' + i + '">' +
            '<div class="cart-product">' +
            '<div class="cart-product-img"><img src="' + img + '" alt=""></div>' +
            '<div class="cart-product-info">' +
            '<h3>Cold9&reg; Insulated Baseball Pants</h3>' +
            '<div class="cart-product-meta">' +
            '<span>Color: ' + (item.colorName || item.color) + '</span>' +
            '<span>Size: ' + item.size + '</span>' +
            '</div>' +
            '</div>' +
            '</div>' +
            '<div class="cart-qty">' +
            '<button class="qty-dec" data-i="' + i + '" aria-label="Decrease">&minus;</button>' +
            '<span class="cart-qty-val">' + item.qty + '</span>' +
            '<button class="qty-inc" data-i="' + i + '" aria-label="Increase">+</button>' +
            '</div>' +
            '<div class="cart-row-total">$' + itemTotal.toFixed(2) + '</div>' +
            '<button class="cart-delete" data-i="' + i + '" aria-label="Remove item">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
            '</button>' +
            '</div>';
        });

        countEl.textContent = totalQty + (totalQty === 1 ? ' item' : ' items');
        rowsEl.innerHTML = html;
        totalEl.textContent = '$' + total.toFixed(2);

        // Qty buttons
        rowsEl.querySelectorAll('.qty-dec').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var idx = parseInt(btn.getAttribute('data-i'), 10);
            var c = getCart();
            if (c[idx].qty > 1) { c[idx].qty--; saveCart(c); render(); }
          });
        });
        rowsEl.querySelectorAll('.qty-inc').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var idx = parseInt(btn.getAttribute('data-i'), 10);
            var c = getCart();
            if (c[idx].qty < 99) { c[idx].qty++; saveCart(c); render(); }
          });
        });

        // Delete buttons
        rowsEl.querySelectorAll('.cart-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var idx = parseInt(btn.getAttribute('data-i'), 10);
            var c = getCart();
            c.splice(idx, 1);
            saveCart(c);
            render();
          });
        });
      }

      render();
    })();
  </script>

</body>
</html>
